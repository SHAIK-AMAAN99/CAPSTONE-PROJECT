<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGOIST - Isagi Yoichi Cinematic Intro</title>
    <!-- Google Fonts for premium cinematic look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:ital,wght@0,300;0,400;0,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #00f0ff;
            --dark-blue: #006680;
            --aura-glow: rgba(0, 240, 255, 0.4);
            --bg-dark: #020306;
            --overlay-vignette: radial-gradient(circle, rgba(0, 0, 0, 0.1) 0%, rgba(2, 3, 6, 0.92) 85%);
            --font-cinematic: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: var(--font-body);
            color: #fff;
        }

        /* --- FULLSCREEN SCENE CONTAINER --- */
        #scene-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- BACKGROUND VIDEO PLAYER --- */
        .video-background {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }

        /* --- CINEMATIC DARK OVERLAY --- */
        .cinematic-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-vignette);
            z-index: 2;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        .cinematic-overlay.fade-out {
            opacity: 0.3; /* Stays slightly dimmed for text readability */
        }

        /* --- INTRO / START OVERLAY MENU --- */
        #intro-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 3, 6, 0.85); /* Dark screen overlay before start */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #intro-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }

        /* Puzzle Piece Emblem (Original SVG Isagi Yoichi motif) */
        .intro-emblem {
            width: 80px;
            height: 80px;
            margin-bottom: 25px;
            fill: var(--primary-blue);
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.45));
            animation: emblem-pulse 2.2s ease-in-out infinite;
        }

        @keyframes emblem-pulse {
            0% { transform: scale(1.0); }
            50% { transform: scale(1.06); filter: drop-shadow(0 0 18px rgba(0, 240, 255, 0.65)); }
            100% { transform: scale(1.0); }
        }

        .intro-title {
            font-family: var(--font-cinematic);
            font-size: 2.5rem;
            letter-spacing: 6px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .intro-desc {
            font-size: 0.85rem;
            color: #8fa0cc;
            margin-bottom: 40px;
            line-height: 1.6;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Cinematic Start Button */
        .btn-cinematic {
            font-family: var(--font-cinematic);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            padding: 15px 45px;
            background: transparent;
            border: 2px solid var(--primary-blue);
            color: #fff;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 2px;
            text-transform: uppercase;
        }

        .btn-cinematic::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .btn-cinematic:hover {
            background-color: var(--primary-blue);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.45);
            color: #000;
            transform: scale(1.05);
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.2);
        }

        .btn-cinematic:hover::before {
            left: 100%;
        }

        .btn-cinematic:active {
            transform: scale(0.98);
        }

        /* --- LOADING SCREEN --- */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: var(--primary-blue);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: var(--font-cinematic);
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: #8fa0cc;
            text-transform: uppercase;
        }

        /* --- HUD / TYPOGRAPHY LAYER --- */
        #layer-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        .cinematic-text-box {
            margin-top: -12%;
            opacity: 0;
            transform: translateY(35px);
            transition: opacity 2.5s cubic-bezier(0.1, 0.8, 0.3, 1), transform 2.5s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .cinematic-text-box.reveal {
            opacity: 1.0;
            transform: translateY(0);
        }

        .main-title {
            font-family: var(--font-cinematic);
            font-size: 5.2rem;
            font-weight: 900;
            letter-spacing: 16px;
            background: linear-gradient(180deg, #ffffff 40%, rgba(0, 240, 255, 0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 15px 35px rgba(0,0,0,0.9), 0 0 20px rgba(0, 240, 255, 0.2);
            margin-bottom: 20px;
        }

        .main-title::after {
            content: '';
            display: block;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-blue), transparent);
            margin: 15px auto 0 auto;
            box-shadow: 0 0 10px var(--primary-blue);
        }

        .subtitle {
            font-size: 1.05rem;
            font-weight: 300;
            color: #b0c2e6;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
            max-width: 750px;
            line-height: 1.6;
        }

        /* --- FALLBACK ERROR TEXT --- */
        .video-fallback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 0;
            width: 85%;
        }

        .video-fallback p {
            font-size: 1.1rem;
            color: #8fa0cc;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.6;
        }

        /* --- RESPONSIVE ADAPTABILITY --- */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.8rem;
                letter-spacing: 8px;
            }
            .subtitle {
                font-size: 0.85rem;
                letter-spacing: 4px;
                max-width: 90%;
            }
            .intro-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div id="scene-container">
        <!-- FALLBACK TEXT: Displayed if the background video cannot load or play -->
        <div class="video-fallback">
            <p>Egoist Awakening...<br>[ Background cinematic video is loading or unsupported ]</p>
        </div>

        <!-- BACKGROUND VIDEO PLAYER -->
        <!-- NOTE: CHANGE THE VIDEO SOURCE PATH BELOW (src="assets/isagi.mp4") IF YOUR ASSET FILE CHANGES -->
        <video class="video-background" id="bg-video" autoplay muted loop playsinline preload="auto">
            <source src="ISAGI.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <!-- CINEMATIC DARK OVERLAY: Provides dark radial vignette for contrast -->
        <div class="cinematic-overlay"></div>

        <!-- HUD / TYPOGRAPHY LAYER: Displays EGOIST title overlay -->
        <div id="layer-hud">
            <div class="cinematic-text-box" id="hud-text">
                <h1 class="main-title">Egoist</h1>
                <p class="subtitle">Devour the field. True genius is born from absolute ego.</p>
            </div>
        </div>

        <!-- START SCENE MENU OVERLAY -->
        <div id="intro-overlay">
            <div class="overlay-card">
                <!-- SVG Puzzle Piece Emblem -->
                <svg class="intro-emblem" viewBox="0 0 100 100">
                    <path d="M 20 20 H 45 C 45 10, 55 10, 55 20 H 80 V 45 C 90 45, 90 55, 80 55 V 80 H 55 C 55 70, 45 70, 45 80 H 20 V 55 C 30 55, 30 45, 20 45 Z" />
                </svg>
                <h2 class="intro-title">Egoist Awakening</h2>
                <p class="intro-desc">Witness the evaluation of Isagi Yoichi as he devours the field</p>
                <button class="btn-cinematic" id="btn-start" onclick="triggerStartScene()">Start Scene</button>
            </div>
        </div>

        <!-- LOADING SCREEN: Monitors video loading before displaying start menu -->
        <div id="loading-screen">
            <div class="spinner"></div>
            <div class="loading-text">Loading Cinematic...</div>
        </div>

        <!-- OPTIONAL BACKGROUND AUDIO SUPPORT (Commented out as requested) -->
        <!--
        <audio id="bg-audio" loop preload="auto">
            <source src="assets/cinematic_audio.mp3" type="audio/mpeg">
        </audio>
        -->
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const loadingScreen = document.getElementById('loading-screen');
        const introOverlay = document.getElementById('intro-overlay');
        const cinematicOverlay = document.querySelector('.cinematic-overlay');
        const hudText = document.getElementById('hud-text');

        // Optional Audio DOM handle (commented out in HTML but cached in code)
        // const audio = document.getElementById('bg-audio');

        // --- HANDLE VIDEO PRELOADING & LOADING SCREEN ---
        // Hide loading screen once video is buffered and ready to play smoothly
        function videoIsReady() {
            loadingScreen.classList.add('fade-out');
        }

        // Check if video is already buffered on load
        if (video.readyState >= 3) {
            videoIsReady();
        } else {
            // Monitor loading events
            video.addEventListener('canplaythrough', videoIsReady);
            video.addEventListener('loadeddata', videoIsReady);
        }

        // Fallback safety timeout: Hide loading screen after 6 seconds even if video load stalls
        setTimeout(() => {
            if (!loadingScreen.classList.contains('fade-out')) {
                console.warn("Video loading timed out or failed. Displaying fallback.");
                videoIsReady();
            }
        }, 6000);

        // --- START SCENE EVENT TRIGGER ---
        function triggerStartScene() {
            // Hide the Start Menu Overlay
            introOverlay.classList.add('hidden');

            // Apply fade-out styling to cinematic overlay for maximum video visibility
            if (cinematicOverlay) {
                cinematicOverlay.classList.add('fade-out');
            }

            // Play background video from the beginning
            video.currentTime = 0;
            const playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.error("Autoplay/play was prevented by browser security rules:", error);
                });
            }

            // Fade in the EGOIST title overlay with transition
            setTimeout(() => {
                hudText.classList.add('reveal');
            }, 1000);

            // Optional background audio play handle (commented out)
            /*
            if (audio) {
                audio.volume = 0.5;
                audio.play().catch(err => console.log("Audio autoplay prevented:", err));
            }
            */
        }
    </script>
</body>
</html>
